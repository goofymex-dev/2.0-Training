<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#080f1a">
<title>Training 80/20</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #080f1a; color: #f1f5f9; font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }
  .screen { flex: 1; overflow-y: auto; padding: 0 16px 90px; -webkit-overflow-scrolling: touch; }
  .header { padding: env(safe-area-inset-top, 20px) 18px 12px; background: rgba(8,15,26,0.97); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .header-label { font-size: 11px; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(8,15,26,0.97); border-top: 1px solid rgba(255,255,255,0.07); display: flex; padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); backdrop-filter: blur(12px); z-index: 50; }
  .nav-btn { flex: 1; background: none; border: none; cursor: pointer; padding: 6px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; color: inherit; }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; color: #334155; transition: color 0.2s; }
  .nav-label.active { color: #38bdf8; font-weight: 700; }
  .btn { border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; transition: all 0.2s; }
  .btn-primary { background: #38bdf8; color: #080f1a; }
  .btn-primary:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #64748b; }
  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px 16px; margin-bottom: 12px; }
  .section-title { font-size: 11px; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; font-weight: 600; margin-top: 4px; }
  .input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 12px; color: #f1f5f9; font-size: 14px; font-family: inherit; outline: none; }
  .input:focus { border-color: rgba(56,189,248,0.4); }
  textarea.input { min-height: 60px; resize: none; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; display: inline-block; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: flex-end; backdrop-filter: blur(8px); }
  .modal { width: 100%; max-width: 480px; margin: 0 auto; background: #0f172a; border-radius: 20px 20px 0 0; padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px)); border: 1px solid rgba(255,255,255,0.08); max-height: 90vh; overflow-y: auto; }
  .score-row { display: flex; gap: 5px; margin-bottom: 14px; }
  .score-btn { flex: 1; padding: 9px 2px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: #64748b; font-size: 10px; cursor: pointer; font-family: inherit; text-align: center; line-height: 1.3; transition: all 0.15s; }
  .score-btn.sel { }
  .zone-bar { display: flex; border-radius: 6px; overflow: hidden; height: 8px; }
  .zone-seg { flex: 1; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .day-card { background: rgba(15,23,42,0.7); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .day-card.done { background: rgba(56,189,248,0.06); border-color: rgba(56,189,248,0.2); }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .event-chip { flex-shrink: 0; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 14px; min-width: 130px; }
  .event-chip.urgent { background: rgba(251,146,60,0.1); border-color: rgba(251,146,60,0.3); }
  .scroll-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 16px; }
  .scroll-row::-webkit-scrollbar { display: none; }
  .stat-box { flex: 1; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
  .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
  .empty-state .emoji { font-size: 52px; margin-bottom: 16px; }
  .log-entry { display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 6px; background: rgba(255,255,255,0.03); border-radius: 9px; border: 1px solid rgba(255,255,255,0.05); }
  .hbtn { background: rgba(255,255,255,0.06); border: none; color: #94a3b8; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
  .settings-panel { background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid rgba(255,255,255,0.07); padding: 12px; margin-bottom: 10px; }
  .settings-label { font-size: 11px; color: #475569; margin-bottom: 4px; }
  .garmin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .garmin-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 12px; }
  .garmin-label { font-size: 10px; color: #475569; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .garmin-input { background: none; border: none; color: #f1f5f9; font-size: 16px; font-weight: 600; font-family: inherit; width: 100%; outline: none; }
  .garmin-unit { font-size: 10px; color: #475569; margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div class="header-row">
      <div>
        <div class="header-label" id="header-label">Trainingsplan · 80/20</div>
        <div class="header-title" id="header-title">Dashboard</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;" id="header-actions">
        <button class="hbtn" onclick="toggleSettings()" id="settings-btn">⚙</button>
      </div>
    </div>
    <div id="sync-status" style="font-size:11px;color:#38bdf8;text-align:right;margin-bottom:4px;opacity:0;transition:opacity 0.3s;min-height:16px"></div>
    <div id="settings-panel" style="display:none;" class="settings-panel">
      <div class="settings-label">Verletzungshinweis</div>
      <input class="input" id="injury-input" placeholder="z.B. Wade links, vorsichtig" style="margin-bottom:8px;font-size:13px;" value="">
      <div class="settings-label" style="margin-top:4px;">Aktuelles Ziel</div>
      <input class="input" id="goal-input" value="HM Hamburg 28.06. in 2:15h" style="font-size:13px;margin-bottom:12px;">
      <div style="border-top:1px solid rgba(255,255,255,0.07);padding-top:12px;margin-top:4px;">
        <div style="font-size:12px;font-weight:600;color:#38bdf8;margin-bottom:8px">☁️ Cloud-Sync (JSONBin.io)</div>
        <div class="settings-label">API Master Key</div>
        <input class="input" id="cloud-key-input" placeholder="$2a$10$..." style="margin-bottom:8px;font-size:12px;" value="">
        <div class="settings-label" style="margin-top:4px;">Bin ID (automatisch nach erstem Sync)</div>
        <input class="input" id="cloud-bin-input" placeholder="wird automatisch gesetzt" style="margin-bottom:10px;font-size:12px;" value="">
        <div style="display:flex;gap:8px;">
          <button onclick="saveCloudSettings()" style="flex:2;padding:9px;background:#38bdf8;border:none;border-radius:9px;color:#080f1a;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Speichern & Sync</button>
          <button onclick="loadFromCloud()" style="flex:1;padding:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit;">↻ Laden</button>
        </div>
        <div style="font-size:10px;color:#334155;margin-top:8px;">Key von jsonbin.io → kostenlos registrieren → API Keys</div>
      </div>
    </div>
    <div style="display:flex;gap:4px;" id="tab-bar">
      <button onclick="setTab('dashboard')" id="tab-dashboard" style="flex:1;padding:7px 0;border-radius:8px;border:none;background:#38bdf8;color:#080f1a;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Dashboard</button>
      <button onclick="setTab('plan')" id="tab-plan" style="flex:1;padding:7px 0;border-radius:8px;border:none;background:rgba(255,255,255,0.05);color:#64748b;font-size:12px;cursor:pointer;font-family:inherit;">Woche</button>
      <button onclick="setTab('history')" id="tab-history" style="flex:1;padding:7px 0;border-radius:8px;border:none;background:rgba(255,255,255,0.05);color:#64748b;font-size:12px;cursor:pointer;font-family:inherit;">Verlauf</button>
      <button onclick="setTab('zones')" id="tab-zones" style="flex:1;padding:7px 0;border-radius:8px;border:none;background:rgba(255,255,255,0.05);color:#64748b;font-size:12px;cursor:pointer;font-family:inherit;">Zonen</button>
    </div>
  </div>
  <div class="screen" id="screen"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const STATE = {
  tab: 'dashboard',
  weekNum: 1,
  weekStore: {},
  logStore: {},
  checkins: [],
  showCheckin: false,
  showSettings: false,
};

const EVENTS = [
  { date: '2026-05-31', label: 'Longrun 1h', icon: '🏃‍♀️' },
  { date: '2026-06-14', label: '100km Radrennen', icon: '🚴‍♀️' },
  { date: '2026-06-28', label: 'HM Hamburg 2:15h', icon: '🏁' },
];
const SPORT_ICONS = { Laufen:'🏃‍♀️', Rad:'🚴‍♀️', Gym:'🏋️‍♀️', Rest:'💤' };
const SPORT_COLORS = { Laufen:'#38bdf8', Rad:'#4ade80', Gym:'#fb923c', Rest:'#1e293b' };
const FEELING_LABELS = ['💀 Kaputt','😓 Müde','😐 Ok','😊 Gut','🔥 Top'];
const FEELING_COLORS = ['#f43f5e','#fb923c','#facc15','#4ade80','#38bdf8'];
const ZONE_COLORS = ['#6366f1','#38bdf8','#2dd4bf','#4ade80','#fb923c'];

function todayStr() { return new Date().toISOString().slice(0,10); }
function daysUntil(d) { return Math.ceil((new Date(d) - new Date(todayStr())) / 86400000); }
function getCloudKey() { return localStorage.getItem('jsonbin_key') || ''; }
function getCloudBin() { return localStorage.getItem('jsonbin_bin') || ''; }

function saveData() {
  try { localStorage.setItem('training_v2', JSON.stringify({weekStore:STATE.weekStore,logStore:STATE.logStore,checkins:STATE.checkins})); } catch(e){}
  syncToCloud();
}

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem('training_v2')||'{}');
    if(d.weekStore) STATE.weekStore=d.weekStore;
    if(d.logStore) STATE.logStore=d.logStore;
    if(d.checkins) STATE.checkins=d.checkins;
  } catch(e){}
}

async function syncToCloud() {
  const key = getCloudKey();
  const bin = getCloudBin();
  if (!key) return;
  const data = {weekStore:STATE.weekStore,logStore:STATE.logStore,checkins:STATE.checkins};
  try {
    if (!bin) {
      // Create new bin
      const r = await fetch('https://api.jsonbin.io/v3/b', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Name':'training-app','X-Bin-Private':'false'},
        body: JSON.stringify(data)
      });
      const j = await r.json();
      if (j.metadata?.id) {
        localStorage.setItem('jsonbin_bin', j.metadata.id);
        showSyncStatus('✓ Cloud gespeichert');
      }
    } else {
      await fetch('https://api.jsonbin.io/v3/b/' + bin, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-Master-Key':key},
        body: JSON.stringify(data)
      });
      showSyncStatus('✓ Cloud gespeichert');
    }
  } catch(e) { showSyncStatus('⚠️ Sync fehlgeschlagen'); }
}

async function loadFromCloud() {
  const key = getCloudKey();
  const bin = getCloudBin();
  if (!key || !bin) return;
  showSyncStatus('↻ Lade von Cloud…');
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + bin + '/latest', {
      headers: {'X-Master-Key': key}
    });
    const j = await r.json();
    if (j.record) {
      const d = j.record;
      if(d.weekStore) STATE.weekStore=d.weekStore;
      if(d.logStore) STATE.logStore=d.logStore;
      if(d.checkins) STATE.checkins=d.checkins;
      localStorage.setItem('training_v2', JSON.stringify(d));
      showSyncStatus('✓ Cloud geladen');
      render();
    }
  } catch(e) { showSyncStatus('⚠️ Laden fehlgeschlagen'); }
}

function showSyncStatus(msg) {
  let el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

async function saveCloudSettings() {
  const key = document.getElementById('cloud-key-input')?.value?.trim();
  const bin = document.getElementById('cloud-bin-input')?.value?.trim();
  if (key) localStorage.setItem('jsonbin_key', key);
  if (bin) localStorage.setItem('jsonbin_bin', bin);
  if (key) {
    await loadFromCloud();
  }
  showSyncStatus('✓ Einstellungen gespeichert');
}

// ── API ────────────────────────────────────────────────────────────────────
async function callClaude(system, user) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' },
    body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 2000, system, messages: [{ role:'user', content:user }] })
  });
  if (!r.ok) throw new Error('API ' + r.status);
  const data = await r.json();
  const text = data.content?.find(b=>b.type==='text')?.text || '';
  for (const attempt of [text, text.replace(/^```(?:json)?\n?/m,'').replace(/```$/m,'').trim()]) {
    try { return JSON.parse(attempt); } catch(e) {}
    try { const s=attempt.indexOf('{'),e2=attempt.lastIndexOf('}'); if(s>-1&&e2>-1) return JSON.parse(attempt.slice(s,e2+1)); } catch(e) {}
  }
  throw new Error('JSON parse failed');
}

function generateWeekPlan() {
  const w = STATE.weekNum;
  const injury = document.getElementById('injury-input')?.value || '';
  const isRecovery = w % 4 === 0;
  const isHard = w % 4 === 2;
  const load = isRecovery ? 'leicht' : isHard ? 'hoch' : 'mittel';
  const structs = [
    ['Rest','Laufen','Gym','Laufen','Rest','Rad','Laufen'],
    ['Laufen','Rest','Laufen','Gym','Rest','Rad','Laufen'],
    ['Rest','Laufen','Rad','Gym','Laufen','Rest','Laufen'],
  ];
  const struct = structs[(w-1) % 3];
  const days = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  const longDur = w<=2?'60 min':w<=5?'70 min':'80 min';
  const easyDur = isRecovery?'35 min':w<=3?'40 min':'50 min';
  const injuryNote = injury ? ' Vorsicht: '+injury+'.' : '';
  const runPool = [
    {title:'Easy Run',duration:easyDur,zones:'Zone 2',description:'Lockeres Dauertempo, HF 141-166 bpm. Pace ca. 8:15-8:20 min/km.'+injuryNote,intensity:'easy'},
    {title:'Grundlage',duration:easyDur,zones:'Zone 2',description:'Gleichmaessiges lockeres Tempo. Fokus auf Laufgefuehl, nicht auf Pace.',intensity:'easy'},
    {title:'Longrun',duration:longDur,zones:'Zone 2',description:'Langer lockerer Lauf. HF unter 166 bpm halten. Letzte 10 min duerfen etwas schneller werden.',intensity:'moderate'},
    {title:'Intervalle',duration:'50 min',zones:'Zone 4-5',description:'15 min Einlaufen Z2, dann 6x3 min in Z4-5 (Pace 6:00-6:15), je 90 sek Trabpause, 10 min Auslaufen.',intensity:'hard'},
    {title:'Tempolauf',duration:'45 min',zones:'Zone 3',description:'10 min Einlaufen, 20 min Schwellentempo Z3 (Pace 7:00-7:30), 10 min Auslaufen.',intensity:'moderate'},
  ];
  const bikePool = [
    {title:'Radausfahrt',duration:w<=3?'75 min':'90 min',zones:'Zone 2',description:'Lockere Ausfahrt, HF 118-142 bpm. Gleichmaessige Trittfrequenz.'},
    {title:'Rad Easy',duration:'60 min',zones:'Zone 1-2',description:'Sehr lockeres Tempo. Aktive Erholung auf dem Rad, HF unter 142 bpm.'},
  ];
  const gymPool = [
    {title:'Krafttraining',duration:'60 min',description:'Rumpfstabilitaet, Knie- und Hueftkraeftigung. Kniebeuge, Lunges, Planks, einbeinige Uebungen.'},
    {title:'Gym & Core',duration:'55 min',description:'Functional Training: Deadlifts, Glute Bridges, Seitstütze. Fokus auf Verletzungspraevention.'},
  ];
  const focuses = ['Grundlagenaufbau','Aerobe Basis','Ausdaueraufbau','Aktive Erholung','Tempohaerte','Wettkampfvorbereitung'];
  const notes = [
    'Zone 2 fuehlt sich anfangs sehr langsam an — das ist richtig so. Geduld zahlt sich aus.',
    'Nicht zu viel auf einmal. Konsequenz schlaegt Intensitaet.',
    'Wenn die Beine schwer sind, lieber kuerzer und lockerer als geplant.',
    'Erholungswoche! Kein Stress, kein Vergleich mit letzter Woche.',
    'Diese Woche darf es einmal mehr wehtun — aber nur einmal.',
    'Hamburg rueckt naeher. Vertraue dem Training.',
  ];
  const runOrder = isHard ? [0,4,2] : isRecovery ? [0,1,2] : [0,1,2];
  let runIdx = 0;
  const planDays = days.map((day, i) => {
    const sport = struct[i];
    if (sport === 'Rest') return {day,sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Aktive Erholung: Spaziergang, Stretching, Foam Rolling.',intensity:'easy'};
    if (sport === 'Gym') { const g=gymPool[(w-1)%2]; return {day,sport:'Gym',title:g.title,duration:g.duration,zones:'',description:g.description,intensity:'moderate'}; }
    if (sport === 'Rad') { const b=bikePool[(w-1)%2]; return {day,sport:'Rad',title:b.title,duration:b.duration,zones:b.zones,description:b.description,intensity:'easy'}; }
    if (sport === 'Laufen') { const r=runPool[runOrder[runIdx++%runOrder.length]]; return {day,sport:'Laufen',title:r.title,duration:r.duration,zones:r.zones,description:r.description,intensity:r.intensity}; }
    return {day,sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Erholung.',intensity:'easy'};
  });
  return {weekFocus:focuses[(w-1)%focuses.length],weeklyLoad:load,coachNote:notes[(w-1)%notes.length],days:planDays};
}

async function getCoachFeedback(data) {
  const system = 'Du bist Trainingscoach. Antworte NUR mit JSON. Kein Markdown.';
  const user = `Training: ${data.sport}. Gefuehl: ${data.feeling}/5. Distanz: ${data.distance||''}km. Zeit: ${data.duration||''}. Pace: ${data.pace||''}. HF Schnitt: ${data.avgHr||''}bpm. HF Max: ${data.maxHr||''}bpm. Kadenz: ${data.cadence||''}. Hoehenmeter: ${data.elevation||''}m. Schmerzen: ${data.injury||'keine'}. Notiz: ${data.note||''}.
JSON: {"feedback":"2-3 Saetze Feedback","emoji":"passendes Emoji","tip":"kurzer konkreter Tipp"}`;
  return callClaude(system, user);
}

// ── Check-in ───────────────────────────────────────────────────────────────
let checkinState = { step:'morning', morning:{}, post:{}, todayPlan:null };

function openCheckin() {
  const names = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const plan = STATE.weekStore[STATE.weekNum];
  checkinState = { step:'morning', morning:{}, post:{}, todayPlan: plan?.days?.find(d=>d.day===names[new Date().getDay()]) };
  renderCheckin();
}

function renderCheckin() {
  const s = checkinState;
  let html = '';
  if (s.step === 'feedback') {
    html = `<div style="text-align:center;margin-bottom:20px">
      <div style="font-size:52px;margin-bottom:10px">${s.feedback?.emoji||'👍'}</div>
      <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:10px">Coach-Feedback</div>
      <div style="font-size:14px;color:#94a3b8;line-height:1.6">${s.feedback?.feedback||''}</div>
      ${s.feedback?.tip?`<div style="margin-top:12px;padding:10px 14px;background:rgba(56,189,248,0.08);border-radius:10px;font-size:13px;color:#38bdf8">💡 ${s.feedback.tip}</div>`:''}
    </div>
    <button class="btn btn-primary" onclick="closeCheckin()">Fertig</button>`;
  } else if (s.step === 'morning') {
    html = `<div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px">Guten Morgen ☀️</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:18px">Wie startest du in den Tag?</div>
    <div class="section-title">Allgemeines Gefühl</div>
    <div class="score-row">${FEELING_LABELS.map((l,i)=>scoreBtn(l,i+1,'feeling-m',s.morning.feeling)).join('')}</div>
    <div class="section-title">Beine</div>
    <div class="score-row">${['💀 Schwer','😓 Müde','😐 Ok','😊 Frisch','🔥 Top'].map((l,i)=>scoreBtn(l,i+1,'legs-m',s.morning.legs)).join('')}</div>
    <div class="section-title">Schlaf</div>
    <div class="score-row">${['😫 Schlecht','😓 Wenig','😐 Ok','😊 Gut','🌙 Top'].map((l,i)=>scoreBtn(l,i+1,'sleep-m',s.morning.sleep)).join('')}</div>
    <textarea class="input" id="morning-note" placeholder="Notiz (optional)..." style="margin-bottom:16px">${s.morning.note||''}</textarea>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeCheckin()">Überspringen</button>
      <button class="btn btn-primary" style="flex:2" ${!s.morning.feeling?'disabled':''} onclick="saveMorning()">
        ${s.todayPlan&&s.todayPlan.sport!=='Rest'?'Weiter → Training':'Speichern'}
      </button>
    </div>`;
  } else {
    const sport = s.todayPlan?.sport || 'Laufen';
    const isRun = sport === 'Laufen';
    const isBike = sport === 'Rad';
    html = `<div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px">${SPORT_ICONS[sport]||'🏃‍♀️'} Wie war das Training?</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:18px">${s.todayPlan?.title||''}</div>
    <div class="section-title">Gefühl</div>
    <div class="score-row">${FEELING_LABELS.map((l,i)=>scoreBtn(l,i+1,'feeling-p',s.post.feeling)).join('')}</div>
    <div class="section-title">Garmin-Daten</div>
    <div class="garmin-grid">
      <div class="garmin-box"><div class="garmin-label">Distanz</div><input class="garmin-input" id="g-distance" type="number" step="0.1" placeholder="0.0" value="${s.post.distance||''}"><div class="garmin-unit">km</div></div>
      <div class="garmin-box"><div class="garmin-label">Zeit</div><input class="garmin-input" id="g-duration" placeholder="0:00:00" value="${s.post.duration||''}"><div class="garmin-unit">h:mm:ss</div></div>
      ${isRun||isBike?`<div class="garmin-box"><div class="garmin-label">${isRun?'Pace Schnitt':'Geschw.'}</div><input class="garmin-input" id="g-pace" placeholder="${isRun?'8:20':'28.5'}" value="${s.post.pace||''}"><div class="garmin-unit">${isRun?'min/km':'km/h'}</div></div>`:''}
      <div class="garmin-box"><div class="garmin-label">HF Schnitt</div><input class="garmin-input" id="g-avghr" type="number" placeholder="145" value="${s.post.avgHr||''}"><div class="garmin-unit">bpm</div></div>
      <div class="garmin-box"><div class="garmin-label">HF Max</div><input class="garmin-input" id="g-maxhr" type="number" placeholder="172" value="${s.post.maxHr||''}"><div class="garmin-unit">bpm</div></div>
      ${isRun?`<div class="garmin-box"><div class="garmin-label">Kadenz</div><input class="garmin-input" id="g-cadence" type="number" placeholder="175" value="${s.post.cadence||''}"><div class="garmin-unit">spm</div></div>`:''}
      <div class="garmin-box"><div class="garmin-label">Höhenmeter</div><input class="garmin-input" id="g-elevation" type="number" placeholder="0" value="${s.post.elevation||''}"><div class="garmin-unit">m ↑</div></div>
    </div>
    <div class="section-title">Schmerzen / Beschwerden</div>
    <input class="input" id="g-injury" placeholder="z.B. Wade links — oder leer lassen" style="margin-bottom:12px" value="${s.post.injury||''}">
    <div class="section-title">Notiz</div>
    <textarea class="input" id="g-note" placeholder="Wie hat es sich angefühlt?" style="margin-bottom:16px">${s.post.note||''}</textarea>
    <div id="checkin-error" style="color:#f43f5e;font-size:12px;margin-bottom:8px;display:none"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeCheckin()">Überspringen</button>
      <button class="btn btn-primary" style="flex:2" id="post-save-btn" ${!s.post.feeling?'disabled':''} onclick="savePost()">
        Coach-Feedback holen
      </button>
    </div>`;
  }

  let modal = document.getElementById('checkin-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'checkin-modal';
    modal.className = 'modal-backdrop';
    modal.innerHTML = `<div class="modal" id="checkin-inner"></div>`;
    document.body.appendChild(modal);
  }
  document.getElementById('checkin-inner').innerHTML = html;
  modal.style.display = 'flex';
}

function scoreBtn(label, val, key, selected) {
  const idx = val - 1;
  const color = FEELING_COLORS[idx];
  const sel = selected === val;
  return `<button class="score-btn ${sel?'sel':''}" style="${sel?`background:${color}22;border-color:${color};color:${color}`:''}" onclick="setScore('${key}',${val})">${label}</button>`;
}

function setScore(key, val) {
  if (key === 'feeling-m') checkinState.morning.feeling = val;
  else if (key === 'legs-m') checkinState.morning.legs = val;
  else if (key === 'sleep-m') checkinState.morning.sleep = val;
  else if (key === 'feeling-p') checkinState.post.feeling = val;
  renderCheckin();
}

function saveMorning() {
  checkinState.morning.note = document.getElementById('morning-note')?.value || '';
  if (checkinState.todayPlan && checkinState.todayPlan.sport !== 'Rest') {
    checkinState.step = 'post';
    renderCheckin();
  } else {
    saveCheckinData();
    closeCheckin();
  }
}

async function savePost() {
  const btn = document.getElementById('post-save-btn');
  const errEl = document.getElementById('checkin-error');
  checkinState.post = {
    ...checkinState.post,
    distance: document.getElementById('g-distance')?.value || '',
    duration: document.getElementById('g-duration')?.value || '',
    pace: document.getElementById('g-pace')?.value || '',
    avgHr: document.getElementById('g-avghr')?.value || '',
    maxHr: document.getElementById('g-maxhr')?.value || '',
    cadence: document.getElementById('g-cadence')?.value || '',
    elevation: document.getElementById('g-elevation')?.value || '',
    injury: document.getElementById('g-injury')?.value || '',
    note: document.getElementById('g-note')?.value || '',
  };
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> KI analysiert…'; }
  try {
    const fb = await getCoachFeedback({ sport: checkinState.todayPlan?.sport || 'Training', ...checkinState.post });
    checkinState.feedback = fb;
    checkinState.step = 'feedback';
    saveCheckinData();
    renderCheckin();
  } catch(e) {
    saveCheckinData();
    if (errEl) { errEl.style.display='block'; errEl.textContent='Feedback nicht verfügbar — Daten gespeichert.'; }
    if (btn) { btn.disabled = false; btn.innerHTML = 'Nochmal versuchen'; }
  }
}

function saveCheckinData() {
  const today = todayStr();
  STATE.checkins = STATE.checkins.filter(c => c.date !== today);
  STATE.checkins.push({ date: today, morning: { ...checkinState.morning }, post: checkinState.post.feeling ? { ...checkinState.post } : null });
  saveData();
  render();
}

function closeCheckin() {
  const modal = document.getElementById('checkin-modal');
  if (modal) modal.style.display = 'none';
}

// ── Rendering ──────────────────────────────────────────────────────────────
function setTab(tab) {
  STATE.tab = tab;
  ['dashboard','plan','history','zones'].forEach(t => {
    const btn = document.getElementById('tab-' + t);
    if (!btn) return;
    const active = t === tab;
    btn.style.background = active ? '#38bdf8' : 'rgba(255,255,255,0.05)';
    btn.style.color = active ? '#080f1a' : '#64748b';
    btn.style.fontWeight = active ? '700' : '400';
  });
  const titles = { dashboard:'Dashboard', plan:`Woche ${STATE.weekNum}`, history:'Verlauf', zones:'Zonen' };
  document.getElementById('header-title').textContent = titles[tab];
  const weekBtns = document.getElementById('week-nav');
  if (weekBtns) weekBtns.style.display = tab === 'plan' ? 'flex' : 'none';
  render();
}

function toggleSettings() {
  STATE.showSettings = !STATE.showSettings;
  const panel = document.getElementById('settings-panel');
  if (panel) panel.style.display = STATE.showSettings ? 'block' : 'none';
  const btn = document.getElementById('settings-btn');
  if (btn) { btn.style.background = STATE.showSettings ? 'rgba(56,189,248,0.15)' : 'rgba(255,255,255,0.06)'; btn.style.color = STATE.showSettings ? '#38bdf8' : '#94a3b8'; }
  // Pre-fill cloud settings
  const keyEl = document.getElementById('cloud-key-input');
  const binEl = document.getElementById('cloud-bin-input');
  if (keyEl) keyEl.value = getCloudKey();
  if (binEl) binEl.value = getCloudBin();
}

function render() {
  const screen = document.getElementById('screen');
  if (!screen) return;
  if (STATE.tab === 'dashboard') screen.innerHTML = renderDashboard();
  else if (STATE.tab === 'plan') screen.innerHTML = renderPlan();
  else if (STATE.tab === 'history') screen.innerHTML = renderHistory();
  else if (STATE.tab === 'zones') screen.innerHTML = renderZones();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard() {
  const today = todayStr();
  const todayCheckin = STATE.checkins.find(c => c.date === today);
  const names = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const plan = STATE.weekStore[STATE.weekNum];
  const todayPlan = plan?.days?.find(d => d.day === names[new Date().getDay()]);
  const recent = [...STATE.checkins].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);
  const avgFeeling = recent.length > 0 ? (recent.reduce((s,c)=>s+(c.morning?.feeling||0),0)/recent.length).toFixed(1) : null;

  const events = EVENTS.map(ev => {
    const days = daysUntil(ev.date);
    if (days < -1) return '';
    const urgent = days <= 7;
    return `<div class="event-chip ${urgent?'urgent':''}">
      <div style="font-size:22px;margin-bottom:4px">${ev.icon}</div>
      <div style="font-size:11px;font-weight:600;color:#f1f5f9;margin-bottom:2px">${ev.label}</div>
      <div style="font-size:12px;color:${urgent?'#fb923c':'#64748b'}">${days===0?'Heute!':days===1?'Morgen!':'in '+days+' Tagen'}</div>
    </div>`;
  }).join('');

  const todayCard = todayPlan ? `<div class="card" style="border-color:${SPORT_COLORS[todayPlan.sport]||'#1e293b'}33">
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="font-size:30px">${SPORT_ICONS[todayPlan.sport]||'📅'}</div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600;color:#f1f5f9">${todayPlan.title}</div>
        <div style="font-size:12px;color:${SPORT_COLORS[todayPlan.sport]||'#64748b'};margin-top:2px">${todayPlan.zones} ${todayPlan.duration?'· '+todayPlan.duration:''}</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px;line-height:1.5">${todayPlan.description}</div>
      </div>
    </div>
  </div>` : `<div class="card"><div style="color:#475569;font-size:13px">Noch kein Plan generiert — geh zum Woche-Tab.</div></div>`;

  const statsRow = avgFeeling ? `<div style="display:flex;gap:8px;margin-bottom:16px">
    <div class="stat-box"><div style="font-size:20px;font-weight:700;color:#38bdf8">${avgFeeling}</div><div style="font-size:10px;color:#475569;margin-top:2px">Ø Gefühl</div></div>
    <div class="stat-box"><div style="font-size:20px;font-weight:700;color:#4ade80">${recent.length}</div><div style="font-size:10px;color:#475569;margin-top:2px">Check-ins</div></div>
    <div class="stat-box"><div style="font-size:20px;font-weight:700;color:#fb923c">${STATE.weekNum}</div><div style="font-size:10px;color:#475569;margin-top:2px">Woche</div></div>
  </div>` : '';

  const recentHtml = recent.map(c => {
    const fi = (c.morning?.feeling||3)-1;
    return `<div class="log-entry">
      <div style="font-size:22px">${FEELING_LABELS[fi].split(' ')[0]}</div>
      <div style="flex:1">
        <div style="font-size:12px;color:#94a3b8">${new Date(c.date+'T12:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})}</div>
        ${c.post ? `<div style="font-size:11px;color:#475569">${c.post.distance?c.post.distance+'km · ':''} ${c.post.pace?c.post.pace+(c.todayPlan?.sport==='Rad'?' km/h':' min/km')+' · ':''} ${c.post.avgHr?c.post.avgHr+' bpm':''}</div>` : ''}
        ${c.post?.injury ? `<div style="font-size:11px;color:#fb923c">⚠️ ${c.post.injury}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  return `
    <div style="padding-top:16px">
      <div class="section-title">Nächste Events</div>
      <div class="scroll-row">${events}</div>
      <div class="section-title">Heute · ${new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})}</div>
      ${todayCard}
      <button onclick="openCheckin()" style="width:100%;padding:14px;background:${todayCheckin?'rgba(74,222,128,0.1)':'rgba(56,189,248,0.12)'};border:1px solid ${todayCheckin?'rgba(74,222,128,0.3)':'rgba(56,189,248,0.3)'};border-radius:12px;color:${todayCheckin?'#4ade80':'#38bdf8'};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:16px">
        ${todayCheckin ? '✓ Check-in heute: ' + FEELING_LABELS[(todayCheckin.morning?.feeling||3)-1] : '📋 Tages Check-in starten'}
      </button>
      ${statsRow}
      ${recent.length > 0 ? `<div class="section-title">Verlauf</div>${recentHtml}` : ''}
    </div>`;
}

// ── Plan ───────────────────────────────────────────────────────────────────
function renderPlan() {
  const plan = STATE.weekStore[STATE.weekNum];
  const logged = STATE.logStore[STATE.weekNum] || {};

  if (!plan) return `
    <div class="empty-state">
      <div class="emoji">🗓</div>
      <div style="font-size:16px;color:#94a3b8;margin-bottom:8px">Noch kein Plan für Woche ${STATE.weekNum}</div>
      <div style="font-size:13px;margin-bottom:28px">KI generiert deinen persönlichen 80/20-Plan</div>
      <button class="btn btn-primary" style="max-width:240px;margin:0 auto" id="gen-btn" onclick="handleGenerate()">Plan generieren</button>
      <div id="gen-error" style="color:#f43f5e;font-size:12px;margin-top:12px"></div>
    </div>`;

  const total = plan.days.filter(d=>d.sport!=='Rest').length;
  const done = plan.days.filter(d=>d.sport!=='Rest'&&logged[d.day]).length;
  const easyDone = plan.days.filter(d=>d.intensity==='easy'&&logged[d.day]).length;
  const hardDone = plan.days.filter(d=>(d.intensity==='moderate'||d.intensity==='hard')&&logged[d.day]).length;
  const td = easyDone + hardDone;
  const easyPct = td > 0 ? Math.round(easyDone/td*100) : 80;
  const loadColors = {leicht:'#4ade80',mittel:'#fb923c',hoch:'#f43f5e'};

  const daysHtml = plan.days.map(d => {
    const color = SPORT_COLORS[d.sport]||'#334155';
    const isLogged = !!logged[d.day];
    const dotColor = {easy:'#4ade80',moderate:'#fb923c',hard:'#f43f5e'}[d.intensity];
    return `<div class="day-card ${isLogged?'done':''}">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <div style="width:38px;height:38px;border-radius:9px;background:${color}18;border:1px solid ${color}33;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${SPORT_ICONS[d.sport]||'📅'}</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:#475569">${d.day}</span>
            <div style="display:flex;gap:6px;align-items:center">
              ${d.duration?`<span style="font-size:11px;color:#64748b">${d.duration}</span>`:''}
              ${dotColor&&d.sport!=='Rest'?`<div style="width:7px;height:7px;border-radius:50%;background:${dotColor}"></div>`:''}
            </div>
          </div>
          <div style="font-size:14px;font-weight:600;color:#f1f5f9;margin:2px 0">${d.title}</div>
          ${d.zones?`<div style="font-size:11px;color:${color};margin-bottom:3px">${d.zones}</div>`:''}
          <div style="font-size:12px;color:#64748b;line-height:1.5">${d.description}</div>
        </div>
      </div>
      ${d.sport!=='Rest'?`<button onclick="toggleLog('${d.day}')" style="margin-top:8px;width:100%;padding:7px;background:${isLogged?'rgba(74,222,128,0.1)':'rgba(255,255,255,0.03)'};border:1px solid ${isLogged?'#4ade8033':'rgba(255,255,255,0.08)'};border-radius:8px;color:${isLogged?'#4ade80':'#475569'};font-size:12px;cursor:pointer;font-family:inherit">
        ${isLogged?'✓ Erledigt':'Als erledigt markieren'}
      </button>`:''}
    </div>`;
  }).join('');

  return `
    <div style="padding-top:16px">
      <div style="background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:12px;padding:12px 14px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600;color:#38bdf8">${plan.weekFocus}</span>
          ${plan.weeklyLoad?`<span class="tag" style="color:${loadColors[plan.weeklyLoad]||'#94a3b8'};background:${loadColors[plan.weeklyLoad]||'#94a3b8'}18">${plan.weeklyLoad}</span>`:''}
        </div>
        ${plan.coachNote?`<div style="font-size:12px;color:#64748b;font-style:italic">💬 ${plan.coachNote}</div>`:''}
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,0.06)">
          <div style="font-size:11px;color:#475569;margin-bottom:3px">Erledigt</div>
          <div style="font-size:18px;font-weight:700;color:#f1f5f9">${done}<span style="font-size:12px;color:#475569">/${total}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${total>0?done/total*100:0}%;background:#38bdf8"></div></div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,0.06)">
          <div style="font-size:11px;color:#475569;margin-bottom:3px">80/20 Balance</div>
          <div style="font-size:18px;font-weight:700;color:${easyPct>=75?'#4ade80':'#fb923c'}">${easyPct}<span style="font-size:12px;color:#475569">% easy</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${easyPct}%;background:${easyPct>=75?'#4ade80':'#fb923c'}"></div></div>
        </div>
      </div>
      ${daysHtml}
      <button onclick="handleGenerate()" id="regen-btn" style="width:100%;margin-top:4px;padding:11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;color:#475569;font-size:13px;cursor:pointer;font-family:inherit">↺ Neuen Plan generieren</button>
      <div id="gen-error" style="color:#f43f5e;font-size:12px;margin-top:8px;text-align:center"></div>
    </div>`;
}

async function handleGenerate() {
  const btn = document.getElementById('gen-btn') || document.getElementById('regen-btn');
  const err = document.getElementById('gen-error');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Wird generiert…'; }
  if (err) err.textContent = '';
  try {
    const p = generateWeekPlan();
    STATE.weekStore[STATE.weekNum] = p;
    STATE.logStore[STATE.weekNum] = {};
    saveData();
    render();
  } catch(e) {
    if (err) err.textContent = 'Fehler: ' + e.message;
    if (btn) { btn.disabled=false; btn.innerHTML='Plan generieren'; }
  }
}

function toggleLog(day) {
  if (!STATE.logStore[STATE.weekNum]) STATE.logStore[STATE.weekNum] = {};
  STATE.logStore[STATE.weekNum][day] = !STATE.logStore[STATE.weekNum][day];
  saveData();
  render();
}

function changeWeek(dir) {
  STATE.weekNum = Math.max(1, STATE.weekNum + dir);
  document.getElementById('header-title').textContent = 'Woche ' + STATE.weekNum;
  document.getElementById('week-num').textContent = STATE.weekNum;
  render();
}

// ── History ────────────────────────────────────────────────────────────────
function renderHistory() {
  if (STATE.checkins.length === 0) return `<div class="empty-state"><div class="emoji">📊</div><div>Noch keine Check-ins vorhanden.</div><div style="font-size:12px;margin-top:8px">Starte deinen ersten Check-in auf dem Dashboard.</div></div>`;
  const sorted = [...STATE.checkins].sort((a,b)=>b.date.localeCompare(a.date));
  const injuryDays = STATE.checkins.filter(c=>c.post?.injury).length;
  const avg = (STATE.checkins.reduce((s,c)=>s+(c.morning?.feeling||0),0)/STATE.checkins.length).toFixed(1);
  const entries = sorted.map(c => {
    const fi = (c.morning?.feeling||3)-1;
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600;color:#f1f5f9">${new Date(c.date+'T12:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})}</span>
        <span style="font-size:22px">${FEELING_LABELS[fi].split(' ')[0]}</span>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        ${c.morning?.feeling?`<span style="font-size:12px;color:#64748b">Gefühl: <span style="color:${FEELING_COLORS[fi]}">${FEELING_LABELS[fi]}</span></span>`:''}
        ${c.morning?.legs?`<span style="font-size:12px;color:#64748b">Beine: ${c.morning.legs}/5</span>`:''}
        ${c.morning?.sleep?`<span style="font-size:12px;color:#64748b">Schlaf: ${c.morning.sleep}/5</span>`:''}
      </div>
      ${c.post ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)">
        <div style="font-size:11px;color:#38bdf8;margin-bottom:4px">TRAINING</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${c.post.distance?`<span style="font-size:12px;color:#94a3b8">📍 ${c.post.distance}km</span>`:''}
          ${c.post.duration?`<span style="font-size:12px;color:#94a3b8">⏱ ${c.post.duration}</span>`:''}
          ${c.post.pace?`<span style="font-size:12px;color:#94a3b8">⚡ ${c.post.pace}</span>`:''}
          ${c.post.avgHr?`<span style="font-size:12px;color:#94a3b8">❤️ ${c.post.avgHr}bpm</span>`:''}
          ${c.post.maxHr?`<span style="font-size:12px;color:#94a3b8">❤️‍🔥 ${c.post.maxHr}bpm</span>`:''}
          ${c.post.cadence?`<span style="font-size:12px;color:#94a3b8">👟 ${c.post.cadence}spm</span>`:''}
          ${c.post.elevation?`<span style="font-size:12px;color:#94a3b8">⛰ ${c.post.elevation}m</span>`:''}
        </div>
        ${c.post.injury?`<div style="font-size:12px;color:#fb923c;margin-top:4px">⚠️ ${c.post.injury}</div>`:''}
        ${c.post.note?`<div style="font-size:12px;color:#475569;margin-top:4px;font-style:italic">${c.post.note}</div>`:''}
      </div>` : ''}
    </div>`;
  }).join('');
  return `<div style="padding-top:16px">
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <div class="stat-box"><div style="font-size:20px;font-weight:700;color:#38bdf8">${STATE.checkins.length}</div><div style="font-size:10px;color:#475569;margin-top:2px">Check-ins</div></div>
      <div class="stat-box"><div style="font-size:20px;font-weight:700;color:#4ade80">${avg}/5</div><div style="font-size:10px;color:#475569;margin-top:2px">Ø Gefühl</div></div>
      <div class="stat-box"><div style="font-size:20px;font-weight:700;color:${injuryDays>0?'#fb923c':'#4ade80'}">${injuryDays}</div><div style="font-size:10px;color:#475569;margin-top:2px">⚠️ Tage</div></div>
    </div>
    ${entries}
  </div>`;
}

// ── Zones ──────────────────────────────────────────────────────────────────
function renderZones() {
  const runZones = [
    {id:1,name:'Aktive Regeneration',range:'< 141 bpm',pace:'> 9:00 min/km'},
    {id:2,name:'Grundlage',range:'141–166 bpm',pace:'8:15–8:20 min/km'},
    {id:3,name:'Tempo',range:'166–175 bpm',pace:'7:00–7:30 min/km'},
    {id:4,name:'Schwelle',range:'175–193 bpm',pace:'6:15–6:45 min/km'},
    {id:5,name:'Hoch Intensiv',range:'193–197 bpm',pace:'6:00–6:15 min/km'},
  ];
  const bikeZones = [
    {id:1,name:'Aktive Regeneration',range:'< 118 bpm'},
    {id:2,name:'Grundlage',range:'118–142 bpm'},
    {id:3,name:'Tempo',range:'142–161 bpm'},
    {id:4,name:'Schwelle',range:'161–176 bpm'},
    {id:5,name:'Hoch Intensiv',range:'176–192 bpm'},
  ];
  const zoneRow = (z, showPace) => `<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,0.03);border-radius:9px;border:1px solid rgba(255,255,255,0.05)">
    <div style="width:4px;height:36px;border-radius:2px;background:${ZONE_COLORS[z.id-1]};flex-shrink:0"></div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600;color:#f1f5f9">Zone ${z.id} · ${z.name}</div>
      <div style="font-size:11px;color:#64748b;margin-top:2px">${z.range}${showPace&&z.pace?' · '+z.pace:''}</div>
    </div>
    <span class="tag" style="color:${z.id<=2?'#4ade80':'#fb923c'};background:${z.id<=2?'#4ade8018':'#fb923c18'}">${z.id<=2?'80%':'20%'}</span>
  </div>`;
  return `<div style="padding-top:16px">
    <div class="section-title">🏃‍♀️ Laufen · HFmax 197</div>
    ${runZones.map(z=>zoneRow(z,true)).join('')}
    <div class="section-title" style="margin-top:20px">🚴‍♀️ Rad · HFmax 192</div>
    ${bikeZones.map(z=>zoneRow(z,false)).join('')}
    <div style="padding:14px 16px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);border-radius:12px;margin-top:16px">
      <div style="font-size:12px;font-weight:600;color:#38bdf8;margin-bottom:6px">80/20 Regel</div>
      <div style="font-size:12px;color:#94a3b8;line-height:1.7">80% aller Einheiten in Zone 1–2 (locker, aerob). 20% in Zone 3–5 (intensiv). Diese Verteilung maximiert Ausdaueraufbau und minimiert Verletzungsrisiko.</div>
    </div>
  </div>`;
}

// ── Init ───────────────────────────────────────────────────────────────────
loadData();
// Try to load from cloud on startup
if (getCloudKey() && getCloudBin()) { loadFromCloud(); }

// Add week nav buttons to header
const headerActions = document.getElementById('header-actions');
headerActions.innerHTML = `
  <div id="week-nav" style="display:none;gap:6px">
    <button class="hbtn" onclick="changeWeek(-1)">‹</button>
    <span id="week-num" style="font-size:13px;color:#94a3b8;align-self:center;min-width:20px;text-align:center">1</span>
    <button class="hbtn" onclick="changeWeek(1)">›</button>
  </div>
  <button class="hbtn" onclick="toggleSettings()" id="settings-btn">⚙</button>
`;

render();
</script>
</body>
</html>
