<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#080f1a">
<title>Training 80/20</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080f1a;color:#f1f5f9;font-family:-apple-system,'SF Pro Display',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.screen{flex:1;overflow-y:auto;padding:0 16px 90px;-webkit-overflow-scrolling:touch}
.header{padding:env(safe-area-inset-top,20px) 18px 12px;background:rgba(8,15,26,0.97);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.label{font-size:11px;color:#38bdf8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px}
.title{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.tabs{display:flex;gap:4px}
.tab{flex:1;padding:7px 0;border-radius:8px;border:none;font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.tab.active{background:#38bdf8;color:#080f1a;font-weight:700}
.tab.inactive{background:rgba(255,255,255,0.05);color:#64748b}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.section-title{font-size:11px;color:#38bdf8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;font-weight:600;margin-top:4px}
.btn{border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:all 0.2s}
.btn-primary{background:#38bdf8;color:#080f1a}
.btn-primary:disabled{background:#1e293b;color:#475569;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#64748b}
.input{width:100%;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px;color:#f1f5f9;font-size:14px;font-family:inherit;outline:none}
.input:focus{border-color:rgba(56,189,248,0.4)}
textarea.input{min-height:60px;resize:none}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;display:inline-block}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(8px)}
.modal{width:100%;max-width:480px;margin:0 auto;background:#0f172a;border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));border:1px solid rgba(255,255,255,0.08);max-height:90vh;overflow-y:auto}
.score-row{display:flex;gap:5px;margin-bottom:14px}
.score-btn{flex:1;padding:9px 2px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#64748b;font-size:10px;cursor:pointer;font-family:inherit;text-align:center;line-height:1.3;transition:all 0.15s}
.day-card{background:rgba(15,23,42,0.7);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.day-card.done{background:rgba(56,189,248,0.06);border-color:rgba(56,189,248,0.2)}
.progress-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width 0.4s}
.event-chip{flex-shrink:0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 14px;min-width:130px}
.event-chip.urgent{background:rgba(251,146,60,0.1);border-color:rgba(251,146,60,0.3)}
.scroll-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px}
.scroll-row::-webkit-scrollbar{display:none}
.stat-box{flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 8px;text-align:center;border:1px solid rgba(255,255,255,0.06)}
.empty-state{text-align:center;padding:60px 20px;color:#475569}
.log-entry{display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,0.03);border-radius:9px;border:1px solid rgba(255,255,255,0.05)}
.hbtn{background:rgba(255,255,255,0.06);border:none;color:#94a3b8;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.settings-panel{background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(255,255,255,0.07);padding:12px;margin-bottom:10px}
.garmin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.garmin-box{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px}
.garmin-label{font-size:10px;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em}
.garmin-input{background:none;border:none;color:#f1f5f9;font-size:16px;font-weight:600;font-family:inherit;width:100%;outline:none}
.garmin-unit{font-size:10px;color:#475569;margin-top:2px}
.sync-status{font-size:11px;color:#38bdf8;text-align:right;margin-bottom:4px;opacity:0;transition:opacity 0.3s;min-height:16px}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div class="header-row">
      <div>
        <div class="label">Trainingsplan · 80/20</div>
        <div class="title" id="header-title">Dashboard</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <div id="week-nav" style="display:none;gap:6px;align-items:center">
          <button class="hbtn" onclick="changeWeek(-1)">&#8249;</button>
          <span id="week-num" style="font-size:13px;color:#94a3b8;min-width:20px;text-align:center">1</span>
          <button class="hbtn" onclick="changeWeek(1)">&#8250;</button>
        </div>
        <button class="hbtn" onclick="toggleSettings()" id="settings-btn">&#9881;</button>
      </div>
    </div>
    <div class="sync-status" id="sync-status"></div>
    <div id="settings-panel" style="display:none" class="settings-panel">
      <div style="font-size:11px;color:#475569;margin-bottom:4px">Verletzungshinweis</div>
      <input class="input" id="injury-input" placeholder="z.B. Wade links, vorsichtig" style="margin-bottom:8px;font-size:13px">
      <div style="font-size:11px;color:#475569;margin-bottom:4px;margin-top:4px">Aktuelles Ziel</div>
      <input class="input" id="goal-input" value="HM Hamburg 28.06. in 2:15h" style="font-size:13px;margin-bottom:12px">
      <div style="border-top:1px solid rgba(255,255,255,0.07);padding-top:12px">
        <div style="font-size:12px;font-weight:600;color:#38bdf8;margin-bottom:8px">&#9729;&#65039; Cloud-Sync (JSONBin.io)</div>
        <div style="font-size:11px;color:#475569;margin-bottom:4px">API Master Key</div>
        <input class="input" id="cloud-key-input" placeholder="$2a$10$..." style="margin-bottom:8px;font-size:12px">
        <div style="font-size:11px;color:#475569;margin-bottom:4px">Bin ID</div>
        <input class="input" id="cloud-bin-input" placeholder="wird automatisch gesetzt" style="margin-bottom:10px;font-size:12px">
        <div style="display:flex;gap:8px">
          <button onclick="saveCloudSettings()" style="flex:2;padding:9px;background:#38bdf8;border:none;border-radius:9px;color:#080f1a;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Speichern &amp; Sync</button>
          <button onclick="loadFromCloud()" style="flex:1;padding:9px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:#64748b;font-size:12px;cursor:pointer;font-family:inherit">&#8635; Laden</button>
        </div>
        <div style="font-size:10px;color:#334155;margin-top:8px">Key von jsonbin.io &#8594; kostenlos registrieren &#8594; API Keys</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-dashboard" onclick="setTab('dashboard')">Dashboard</button>
      <button class="tab inactive" id="tab-plan" onclick="setTab('plan')">Woche</button>
      <button class="tab inactive" id="tab-history" onclick="setTab('history')">Verlauf</button>
      <button class="tab inactive" id="tab-form" onclick="setTab('form')">Form</button>
      <button class="tab inactive" id="tab-zones" onclick="setTab('zones')">Zonen</button>
    </div>
  </div>
  <div class="screen" id="screen"></div>
</div>
<div id="checkin-modal" class="modal-backdrop" style="display:none">
  <div class="modal" id="checkin-inner"></div>
</div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────
var EVENTS = [
  {date:'2026-06-28',label:'HM Hamburg 2:15h',icon:'&#x1F3C1;'}
];
var SPORT_ICONS = {Laufen:'&#x1F3C3;&#x200D;&#x2640;&#xFE0F;',Rad:'&#x1F6B4;&#x200D;&#x2640;&#xFE0F;',Gym:'&#x1F3CB;&#x200D;&#x2640;&#xFE0F;',Rest:'&#x1F4A4;'};

var FEELING_LABELS = ['Kaputt','Muede','Ok','Gut','Top'];

var ZONE_COLORS = ['#6366f1','#38bdf8','#2dd4bf','#4ade80','#fb923c'];

  '2026-06-09':32,   // Easy Run 3.7km 8:07 HF141

var TRAINER_WEEK = {
  weekFocus:'Aufbauwoche · Kraft + Longrun + Ride',
  weeklyLoad:'mittel',
  coachNote:'Gute Woche bisher! Intervalle am Donnerstag waren stark. Freitag Kraft, Samstag langer Lauf bis 155bpm, Sonntag lockere Radstunde.',

    {day:'Montag',sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Erholung nach dem Longrun am Sonntag.',intensity:'easy'},
    {day:'Dienstag',sport:'Laufen',title:'Easy Run HR',duration:'30 min',zones:'Zone 1-2',description:'3.70km, Pace 8:07, HF 141 bpm. Erledigt!',intensity:'easy'},

    {day:'Donnerstag',sport:'Laufen',title:'Intervalle',duration:'45 min',zones:'Zone 3-5',description:'Getting back - Intervals. 6km, Pace 7:34, HF 156. Erledigt!',intensity:'hard'},
    {day:'Freitag',sport:'Gym',title:'Krafttraining',duration:'60 min',zones:'',description:'Kraft wie vom Trainer vorgegeben.',intensity:'moderate'},
    {day:'Samstag',sport:'Laufen',title:'Long Run',duration:'1:30h',zones:'Zone 2',description:'Longrun bis max. 155 bpm. Locker und gleichmaessig.',intensity:'moderate'},
    {day:'Sonntag',sport:'Rad',title:'Long Ride',duration:'1:00h',zones:'Zone 2',description:'Lockere Radausfahrt 1 Stunde. HF unter 142 bpm.',intensity:'easy'}
  ]

var WEEK2_PLAN = {
  weekFocus:'Strides & Kontrollierte Intervalle',
  weeklyLoad:'mittel',
  coachNote:'Zwei strukturierte Einheiten diese Woche. Montag Strides locker, Mittwoch kontrollierte 1km-Intervalle bei 6:30. Samstag langer Lauf bis 155bpm.',
  days:[
    {day:'Montag',sport:'Laufen',title:'Strides',duration:'38 min',zones:'Zone 1-2 + Z4',description:'30 min locker (130-157bpm, Z1-2), dann 4x 30sek Beschleunigung Z4 (179bpm) mit je 1:30 Easy Pause. 5km, 27 TSS.',intensity:'moderate'},
    {day:'Dienstag',sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Aktive Erholung.',intensity:'easy'},
    {day:'Mittwoch',sport:'Laufen',title:'Kontrollierte Intervalle',duration:'55 min',zones:'Zone 2-3',description:'1km Warmup Z1, 4x Strides (163-176bpm) mit 30sek Pause, dann 4x 1km @ 6:30 Pace (152-167bpm, Z2-3) mit 1:30 Pause, 10min Cool Down. 6.84km, 46 TSS.',intensity:'hard'},
    {day:'Donnerstag',sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Erholung nach den Intervallen.',intensity:'easy'},
    {day:'Freitag',sport:'Gym',title:'Krafttraining',duration:'60 min',zones:'',description:'Krafttraining wie vom Trainer.',intensity:'moderate'},
    {day:'Samstag',sport:'Laufen',title:'Long Run',duration:'1:15h',zones:'Zone 2',description:'Longrun bis max. 155 bpm. Locker und gleichmaessig, nicht schneller werden.',intensity:'moderate'},
    {day:'Sonntag',sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Vollstaendige Erholung.',intensity:'easy'}
  ]
};

// ── State ──────────────────────────────────────────────────────────────────
var STATE = {tab:'dashboard',weekNum:1,weekStore:{},logStore:{},checkins:[],showSettings:false};

function todayStr(){return new Date().toISOString().slice(0,10)}
function daysUntil(d){return Math.ceil((new Date(d)-new Date(todayStr()))/86400000)}
function dayName(){var n=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];return n[new Date().getDay()]}

function saveLocal(){try{localStorage.setItem('training_v3',JSON.stringify({weekStore:STATE.weekStore,logStore:STATE.logStore,checkins:STATE.checkins}))}catch(e){}}
function loadLocal(){try{var d=JSON.parse(localStorage.getItem('training_v3')||'{}');if(d.weekStore)STATE.weekStore=d.weekStore;if(d.logStore)STATE.logStore=d.logStore;if(d.checkins)STATE.checkins=d.checkins}catch(e){}}
function getCloudKey(){return localStorage.getItem('jsonbin_key')||''}
function getCloudBin(){return localStorage.getItem('jsonbin_bin')||''}

function showSyncStatus(msg){var el=document.getElementById('sync-status');if(el){el.textContent=msg;el.style.opacity='1';setTimeout(function(){el.style.opacity='0'},2500)}}

async function syncToCloud(){
  var key=getCloudKey(),bin=getCloudBin();if(!key)return;
  var data={weekStore:STATE.weekStore,logStore:STATE.logStore,checkins:STATE.checkins};
  try{
    if(!bin){
      var r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Name':'training-app','X-Bin-Private':'false'},body:JSON.stringify(data)});
      var j=await r.json();if(j.metadata&&j.metadata.id){localStorage.setItem('jsonbin_bin',j.metadata.id);showSyncStatus('✓ Cloud gespeichert')}
    }else{
      await fetch('https://api.jsonbin.io/v3/b/'+bin,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':key},body:JSON.stringify(data)});
      showSyncStatus('✓ Cloud gespeichert');
    }
  }catch(e){showSyncStatus('⚠ Sync fehlgeschlagen')}
}

async function loadFromCloud(){
  var key=getCloudKey(),bin=getCloudBin();if(!key||!bin)return;
  showSyncStatus('↻ Lade von Cloud...');
  try{
    var r=await fetch('https://api.jsonbin.io/v3/b/'+bin+'/latest',{headers:{'X-Master-Key':key}});
    var j=await r.json();if(j.record){var d=j.record;if(d.weekStore)STATE.weekStore=d.weekStore;if(d.logStore)STATE.logStore=d.logStore;if(d.checkins)STATE.checkins=d.checkins;saveLocal();showSyncStatus('✓ Cloud geladen');render()}
  }catch(e){showSyncStatus('⚠ Laden fehlgeschlagen')}
}

async function saveCloudSettings(){
  var key=document.getElementById('cloud-key-input').value.trim();
  var bin=document.getElementById('cloud-bin-input').value.trim();
  if(key)localStorage.setItem('jsonbin_key',key);
  if(bin)localStorage.setItem('jsonbin_bin',bin);
  if(key)await loadFromCloud();
  showSyncStatus('✓ Einstellungen gespeichert');
}

function saveData(){saveLocal();syncToCloud()}

// ── Plan Generation ────────────────────────────────────────────────────────
function generateWeekPlan(){
  var w=STATE.weekNum,injury=document.getElementById('injury-input').value||'';
  var isRecovery=w%4===0,isHard=w%4===2;
  var load=isRecovery?'leicht':isHard?'hoch':'mittel';
  var structs=[
    ['Rest','Laufen','Gym','Laufen','Rest','Rad','Laufen'],
    ['Laufen','Rest','Laufen','Gym','Rest','Rad','Laufen'],
    ['Rest','Laufen','Rad','Gym','Laufen','Rest','Laufen']
  ];
  var struct=structs[(w-1)%3];
  var days=['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
  var longDur=w<=2?'60 min':w<=5?'70 min':'80 min';
  var easyDur=isRecovery?'35 min':w<=3?'40 min':'50 min';
  var inj=injury?' Vorsicht: '+injury+'.':'';
  var runPool=[
    {title:'Easy Run',duration:easyDur,zones:'Zone 2',description:'Lockeres Dauertempo, HF 141-166 bpm. Pace 8:33-9:29 min/km.'+inj,intensity:'easy'},
    {title:'Grundlage',duration:easyDur,zones:'Zone 2',description:'Gleichmaessiges lockeres Tempo. Fokus auf Laufgefuehl.',intensity:'easy'},
    {title:'Longrun',duration:longDur,zones:'Zone 2',description:'Langer lockerer Lauf. HF unter 166 bpm halten.',intensity:'moderate'},
    {title:'Intervalle',duration:'50 min',zones:'Zone 4-5',description:'15 min Z2 einlaufen, 6x3 min Z4-5 (Pace 6:00-6:11), je 90 sek Pause, 10 min auslaufen.',intensity:'hard'},
    {title:'Tempolauf',duration:'45 min',zones:'Zone 3',description:'10 min einlaufen, 20 min Z3 (Pace 7:04-8:33), 10 min auslaufen.',intensity:'moderate'}
  ];
  var bikePool=[
    {title:'Radausfahrt',duration:w<=3?'75 min':'90 min',zones:'Zone 2',description:'Lockere Ausfahrt, HF 118-142 bpm.'},
    {title:'Rad Easy',duration:'60 min',zones:'Zone 1-2',description:'Sehr lockeres Tempo, HF unter 142 bpm.'}
  ];
  var gymPool=[
    {title:'Krafttraining',duration:'60 min',description:'Rumpf, Knie, Hueften. Kniebeuge, Lunges, Planks.'},
    {title:'Gym & Core',duration:'55 min',description:'Deadlifts, Glute Bridges, Seitst\u00fctze. Verletzungspraevention.'}
  ];
  var focuses=['Grundlagenaufbau','Aerobe Basis','Ausdaueraufbau','Aktive Erholung','Temporhaerte','HM-Vorbereitung'];
  var notes=[
    'Zone 2 fuehlt sich anfangs zu langsam an - das ist richtig so.',
    'Konsequenz schlaegt Intensitaet.',
    'Wenn die Beine schwer sind, lieber kuerzer und lockerer.',
    'Erholungswoche! Kein Stress.',
    'Diese Woche darf es einmal mehr wehtun.',
    'Hamburg rueckt naeher. Vertraue dem Training.'
  ];
  var runOrder=isHard?[0,4,2]:isRecovery?[0,1,2]:[0,1,2];
  var runIdx=0;
  var planDays=days.map(function(day,i){
    var sport=struct[i];
    if(sport==='Rest')return{day:day,sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Aktive Erholung: Spaziergang, Stretching.',intensity:'easy'};
    if(sport==='Gym'){var g=gymPool[(w-1)%2];return{day:day,sport:'Gym',title:g.title,duration:g.duration,zones:'',description:g.description,intensity:'moderate'}}
    if(sport==='Rad'){var b=bikePool[(w-1)%2];return{day:day,sport:'Rad',title:b.title,duration:b.duration,zones:b.zones,description:b.description,intensity:'easy'}}
    if(sport==='Laufen'){var r=runPool[runOrder[runIdx++%runOrder.length]];return{day:day,sport:'Laufen',title:r.title,duration:r.duration,zones:r.zones,description:r.description,intensity:r.intensity}}
    return{day:day,sport:'Rest',title:'Ruhetag',duration:'',zones:'',description:'Erholung.',intensity:'easy'};
  });
  return{weekFocus:focuses[(w-1)%focuses.length],weeklyLoad:load,coachNote:notes[(w-1)%notes.length],days:planDays};
}

function loadTrainerWeek(){STATE.weekStore[STATE.weekNum]=TRAINER_WEEK;STATE.logStore[STATE.weekNum]={};saveData();render()}
function handleGenerate(){
  try{
    var plan;
    if(STATE.weekNum===1) plan=TRAINER_WEEK;
    else if(STATE.weekNum===2) plan=WEEK2_PLAN;
    else plan=generateWeekPlan();
    STATE.weekStore[STATE.weekNum]=plan;
    STATE.logStore[STATE.weekNum]={};
    saveData();render();
  }catch(e){alert('Fehler: '+e.message)}
}
function toggleLog(day){if(!STATE.logStore[STATE.weekNum])STATE.logStore[STATE.weekNum]={};STATE.logStore[STATE.weekNum][day]=!STATE.logStore[STATE.weekNum][day];saveData();render()}

// ── TSS / CTL / ATL ────────────────────────────────────────────────────────
function parseDuration(str){if(!str)return 0;var p=str.split(':').map(Number);if(p.length===3)return p[0]*3600+p[1]*60+p[2];if(p.length===2)return p[0]*60+p[1];return 0}
function calcTSS(post,sport){
  if(!post)return 0;var dur=parseDuration(post.duration);if(dur===0)return 0;
  var hr=parseInt(post.avgHr)||0,threshold=sport==='Rad'?176:175;
  var ifv=hr>0?Math.min(hr/threshold,1.15):0.65;
  return Math.max(Math.round((dur*ifv*ifv)/36),sport==='Gym'?30:0);
}
function calcFitnessMetrics(){
  var tssMap=Object.assign({},HISTORICAL_TSS);
  STATE.checkins.forEach(function(c){
    if(c.post){
      var names=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
      var plan=STATE.weekStore[STATE.weekNum];
      var sport='Laufen';
      if(plan&&plan.days){
        var dt=new Date(c.date+'T12:00');
        var found=plan.days.find(function(d){return d.day===names[dt.getDay()]});
        if(found)sport=found.sport;
      }
      var realTSS=parseInt(c.post.tss)||0;
      var tss=realTSS>0?realTSS:calcTSS(c.post,sport);
      if(tss>0)tssMap[c.date]=tss;
    }
  });
  var dates=Object.keys(tssMap).sort();
  if(dates.length===0)return null;
  var ctlDecay=1-Math.exp(-1/42),atlDecay=1-Math.exp(-1/7);
  var ctl=0,atl=0,history=[];
  var current=new Date(dates[0]),last=new Date(dates[dates.length-1]);
  while(current<=last){
    var ds=current.toISOString().slice(0,10);
    var tss=tssMap[ds]||0;
    ctl=ctl+ctlDecay*(tss-ctl);atl=atl+atlDecay*(tss-atl);
    history.push({date:ds,tss:tss,ctl:Math.round(ctl),atl:Math.round(atl),tsb:Math.round(ctl-atl)});
    current.setDate(current.getDate()+1);
  }
  return history;
}

function garminBox(label,id,type,placeholder,unit,val){
  return '<div class="garmin-box"><div class="garmin-label">'+label+'</div><input class="garmin-input" id="'+id+'" type="'+type+'" placeholder="'+placeholder+'" value="'+val+'"><div class="garmin-unit">'+unit+'</div></div>';
}

function buildScoreRow(key,selected){
  var labels=['Kaputt','Muede','Ok','Gut','Top'];
  var emojis=['&#x1F480;','&#x1F625;','&#x1F610;','&#x1F60A;','&#x1F525;'];
  var html='';
  for(var i=0;i<5;i++){
    var sel=selected===i+1;
    html+='<button class="score-btn" style="'+(sel?'background:'+FEELING_COLORS[i]+'22;border-color:'+FEELING_COLORS[i]+';color:'+FEELING_COLORS[i]:'')+'" onclick="setScore(\''+key+'\','+(i+1)+')">'+emojis[i]+' '+labels[i]+'</button>';
  }

}

function getLocalFeedback(){
  var feeling=parseInt(CI.post.feeling)||3;
  var pace=parseFloat((CI.post.pace||'').replace(',','.'))||0;
  var avgHr=parseInt(CI.post.avgHr)||0;
  var sport=CI.todayPlan?CI.todayPlan.sport:'Laufen';
  var hasInjury=CI.post.injury&&CI.post.injury.toLowerCase()!=='keine'&&CI.post.injury.trim()!=='';
  var emoji=FEELING_EMOJIS[feeling-1]||'&#x1F610;';
  var feedback,tip;
  if(sport==='Laufen'){
    var inZ2=pace>=8.33&&pace<=9.49,hrZ2=avgHr>=141&&avgHr<=166,hrHigh=avgHr>166;
    if(feeling>=4&&inZ2&&hrZ2){feedback='Sehr solider Lauf! Pace und HF beide in Zone 2. Genau so soll 80/20 aussehen.';tip='Diese Basis zahlt sich beim HM Hamburg aus.';emoji='&#x1F3AF;'}
    else if(hrHigh){feedback='HF war etwas hoch fuer Zone 2. Hitze, Muedigkeit oder Gelaende koennen das erklaeren.';tip='Beim naechsten Easy Run noch mehr auf HF achten. Notfalls gehen.';emoji='&#x1F4CA;'}
    else if(feeling<=2){feedback='Nicht der beste Tag - aber du bist raus, das zaehlt.';tip='Ein schlechter Lauf ist besser als kein Lauf.';emoji='&#x1F4AA;'}
    else{feedback='Solide Einheit.'+(CI.post.distance?' '+CI.post.distance+'km':'')+'. '+(feeling>=3?'Gefuehl war gut.':'Koerper brauchte mehr heute.');tip='Schoen locker bleiben.'}
    if(hasInjury){feedback+=' Wegen '+CI.post.injury+': beobachten ob es besser oder schlechter wird.';tip='Bei anhaltenden Schmerzen einen Tag mehr Pause einplanen.';emoji='&#x26A0;&#xFE0F;'}
  } else if(sport==='Rad'){
    feedback='Radeinheit abgehakt.'+(avgHr?' HF '+avgHr+' bpm.':'')+(feeling>=4?' Beine haben gut mitgemacht.':'');
    tip='Rad ist perfekte aktive Recovery fuer die Laufbeine.';emoji='&#x1F6B4;&#x200D;&#x2640;&#xFE0F;';
  } else {
    feedback='Gym-Einheit erledigt. '+(feeling>=4?'Gutes Kraftgefuehl.':'Nicht jede Session muss perfekt sein.');
    tip='Einbeinige Uebungen besonders wichtig fuer Laufstabilitaet.';emoji='&#x1F3CB;&#x200D;&#x2640;&#xFE0F;';
  }
  return{feedback:feedback,emoji:emoji,tip:tip};
}

function render(){
  var screen=document.getElementById('screen');
  if(!screen)return;
  var html='';
  try{
    if(STATE.tab==='dashboard')html=renderDashboard();
    else if(STATE.tab==='plan')html=renderPlan();
    else if(STATE.tab==='history')html=renderHistory();
    else if(STATE.tab==='form')html=renderForm();
    else if(STATE.tab==='zones')html=renderZones();
  }catch(e){html='<div style="padding:20px;color:#f43f5e">Fehler: '+e.message+'</div>'}
  screen.innerHTML=html;
}

  if(hmDays>=0&&hmDays<=3){

  }
  html+='<button onclick="openManualLog()" style="width:100%;padding:12px;background:'+postBg+';border:1px solid '+postColor+'33;border-radius:12px;color:'+postColor+';font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:16px">'+postLabel+'</button>';

  // Stats
  if(avgFeeling){
    html+='<div style="display:flex;gap:8px;margin-bottom:16px">';
    html+='<div class="stat-box"><div style="font-size:20px;font-weight:700;color:#38bdf8">'+avgFeeling+'</div><div style="font-size:10px;color:#475569;margin-top:2px">&#216; Gefuehl</div></div>';
    html+='<div class="stat-box"><div style="font-size:20px;font-weight:700;color:#4ade80">'+recent.length+'</div><div style="font-size:10px;color:#475569;margin-top:2px">Check-ins</div></div>';
    html+='<div class="stat-box"><div style="font-size:20px;font-weight:700;color:#fb923c">'+STATE.weekNum+'</div><div style="font-size:10px;color:#475569;margin-top:2px">Woche</div></div>';
    html+='</div>';
  }

  // Recent log
  if(recent.length>0){
    html+='<div class="section-title">Verlauf</div>';
    recent.forEach(function(c){
      var fi=(c.morning&&c.morning.feeling?c.morning.feeling:3)-1;
      html+='<div class="log-entry"><div style="font-size:22px">'+FEELING_EMOJIS[fi]+'</div>';
      html+='<div style="flex:1"><div style="font-size:12px;color:#94a3b8">'+new Date(c.date+'T12:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})+'</div>';
      if(c.post){html+='<div style="font-size:11px;color:#475569">'+(c.post.distance?c.post.distance+'km &middot; ':'')+(c.post.pace?c.post.pace+' &middot; ':'')+(c.post.avgHr?c.post.avgHr+' bpm':'')+'</div>'}

      if(c.post&&c.post.injury)html+='<div style="font-size:11px;color:#fb923c">&#9888; '+c.post.injury+'</div>';
      html+='</div></div>';
    });
  }
  html+='</div>';
  return html;
}

      html+='<button class="btn" style="max-width:280px;margin:0 auto;display:block;background:#fb923c;color:#080f1a" onclick="handleGenerate()">&#128203; Trainerwoche laden (Woche 1)</button>';

  html+='<div style="display:flex;gap:8px;margin-bottom:14px">';
  html+='<div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,0.06)">';
  html+='<div style="font-size:11px;color:#475569;margin-bottom:3px">Erledigt</div>';
  html+='<div style="font-size:18px;font-weight:700;color:#f1f5f9">'+done+'<span style="font-size:12px;color:#475569">/'+total+'</span></div>';
  html+='<div class="progress-bar"><div class="progress-fill" style="width:'+(total>0?Math.round(done/total*100):0)+'%;background:#38bdf8"></div></div></div>';
  html+='<div style="flex:1;background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,0.06)">';

  html+='</div>';

  // Day cards
  plan.days.forEach(function(d){
    var color=SPORT_COLORS[d.sport]||'#334155';
    var isLogged=!!logged[d.day];
    var dotColor={easy:'#4ade80',moderate:'#fb923c',hard:'#f43f5e'}[d.intensity]||'';
    html+='<div class="day-card'+(isLogged?' done':'')+'"><div style="display:flex;gap:10px;align-items:flex-start">';
    html+='<div style="width:38px;height:38px;border-radius:9px;background:'+color+'18;border:1px solid '+color+'33;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+SPORT_ICONS[d.sport]+'</div>';
    html+='<div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:center">';

    if(dotColor&&d.sport!=='Rest')html+='<div style="width:7px;height:7px;border-radius:50%;background:'+dotColor+'"></div>';
    html+='</div></div>';

    if(d.zones)html+='<div style="font-size:11px;color:'+color+';margin-bottom:3px">'+d.zones+'</div>';

    html+='</div></div>';
    if(d.sport!=='Rest'){
      html+='<button onclick="toggleLog(\''+d.day+'\')" style="margin-top:8px;width:100%;padding:7px;background:'+(isLogged?'rgba(74,222,128,0.1)':'rgba(255,255,255,0.03)')+';border:1px solid '+(isLogged?'#4ade8033':'rgba(255,255,255,0.08)')+';border-radius:8px;color:'+(isLogged?'#4ade80':'#475569')+';font-size:12px;cursor:pointer;font-family:inherit">'+(isLogged?'&#10003; Erledigt':'Als erledigt markieren')+'</button>';

  html+='<div style="display:flex;gap:8px;margin-top:8px">';

  html+='<button onclick="handleGenerate()" style="flex:1;padding:11px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;color:#475569;font-size:12px;cursor:pointer;font-family:inherit">&#8635; Neu generieren</button>';
  html+='</div></div>';
  return html;
}

// ── History Tab ────────────────────────────────────────────────────────────
function getWeeklyVolume(){
  var runKm=0,bikeKm=0;
  STATE.checkins.forEach(function(c){
    if(!c.post||!c.post.distance)return;
    var km=parseFloat(c.post.distance)||0;
    // Determine sport from date
    var names=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    var plan=STATE.weekStore[STATE.weekNum];
    var dt=new Date(c.date+'T12:00');
    var sport='Laufen';
    if(plan&&plan.days){var found=plan.days.find(function(d){return d.day===names[dt.getDay()]});if(found)sport=found.sport}
    if(sport==='Laufen')runKm+=km;
    else if(sport==='Rad')bikeKm+=km;
  });
  return{run:runKm.toFixed(1),bike:bikeKm.toFixed(1)};
}

function renderHistory(){
  var html='<div style="padding-top:16px">';
  if(STATE.checkins.length===0&&Object.keys(STATE.weekStore).length===0){
    return html+'<div class="empty-state"><div style="font-size:52px;margin-bottom:12px">&#128202;</div><div>Noch keine Daten.</div></div></div>';
  }

  var avg=STATE.checkins.length>0?(STATE.checkins.reduce(function(s,c){return s+(c.morning&&c.morning.feeling?c.morning.feeling:0)},0)/STATE.checkins.length).toFixed(1):'-';

  // Week summaries
  var weekNums=Object.keys(STATE.weekStore).map(Number).sort(function(a,b){return b-a});

    html+='<div class="section-title">Wochenauswertung</div>';
    weekNums.forEach(function(w){
      var plan=STATE.weekStore[w],logs=STATE.logStore[w]||{};

      var dn=plan.days.filter(function(d){return d.sport!=='Rest'&&logs[d.day]}).length;

      var lc={leicht:'#4ade80',mittel:'#fb923c',hoch:'#f43f5e'}[plan.weeklyLoad]||'#64748b';

      html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      html+='<span style="font-size:14px;font-weight:700;color:#f1f5f9">Woche '+w+'</span>';
      html+='<span class="tag" style="color:'+lc+';background:'+lc+'18">'+plan.weeklyLoad+'</span></div>';
      html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">';
      html+='<div style="text-align:center;background:rgba(0,0,0,0.2);border-radius:9px;padding:8px 4px"><div style="font-size:18px;font-weight:700;color:'+(cp>=80?'#4ade80':'#fb923c')+'">'+cp+'%</div><div style="font-size:10px;color:#475569">Abgeschl.</div></div>';
      html+='<div style="text-align:center;background:rgba(0,0,0,0.2);border-radius:9px;padding:8px 4px"><div style="font-size:18px;font-weight:700;color:'+(easyP===null||easyP>=75?'#4ade80':'#fb923c')+'">'+(easyP!==null?easyP+'%':'--')+'</div><div style="font-size:10px;color:#475569">Easy%</div></div>';
      html+='<div style="text-align:center;background:rgba(0,0,0,0.2);border-radius:9px;padding:8px 4px"><div style="font-size:18px;font-weight:700;color:'+(injuries>0?'#fb923c':'#4ade80')+'">'+(injuries>0?injuries+'x':'✓')+'</div><div style="font-size:10px;color:#475569">Beschw.</div></div>';
      html+='</div><div style="font-size:12px;color:#64748b;font-style:italic">'+verdict+'</div></div>';
    });
  }

  html+='<div style="display:flex;gap:8px;margin-bottom:16px">';

  html+='<div class="stat-box"><div style="font-size:20px;font-weight:700;color:#4ade80">'+avg+'/5</div><div style="font-size:10px;color:#475569;margin-top:2px">&#216; Gefuehl</div></div>';
  html+='<div class="stat-box"><div style="font-size:20px;font-weight:700;color:'+(injuries>0?'#fb923c':'#4ade80')+'">'+injuries+'</div><div style="font-size:10px;color:#475569;margin-top:2px">&#9888; Tage</div></div>';
  html+='</div>';

  if(sorted.length>0){
    html+='<div class="section-title">Check-in Verlauf</div>';
    sorted.forEach(function(c){
      var fi=(c.morning&&c.morning.feeling?c.morning.feeling:3)-1;

      html+='<span style="font-size:13px;font-weight:600;color:#f1f5f9">'+new Date(c.date+'T12:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})+'</span>';
      html+='<span style="font-size:22px">'+FEELING_EMOJIS[fi]+'</span></div>';

      if(c.morning&&c.morning.legs)html+='<span style="font-size:12px;color:#64748b">Beine: '+c.morning.legs+'/5</span>';
      if(c.morning&&c.morning.sleep)html+='<span style="font-size:12px;color:#64748b">Schlaf: '+c.morning.sleep+'/5</span>';
      html+='</div>';
      if(c.post){

        if(c.post.pace)html+='<span style="font-size:12px;color:#94a3b8">&#9889; '+c.post.pace+'</span>';
        if(c.post.avgHr)html+='<span style="font-size:12px;color:#94a3b8">&#10084; '+c.post.avgHr+'bpm</span>';
        if(c.post.maxHr)html+='<span style="font-size:12px;color:#94a3b8">&#10084; '+c.post.maxHr+'bpm max</span>';
        if(c.post.cadence)html+='<span style="font-size:12px;color:#94a3b8">&#128095; '+c.post.cadence+'spm</span>';
        if(c.post.elevation)html+='<span style="font-size:12px;color:#94a3b8">&#9968; '+c.post.elevation+'m</span>';
        html+='</div>';
        if(c.post.weather)html+='<div style="font-size:12px;color:#64748b;margin-top:4px">'+c.post.weather+'</div>';
        if(c.post.injury)html+='<div style="font-size:12px;color:#fb923c;margin-top:4px">&#9888; '+c.post.injury+'</div>';
        if(c.post.note)html+='<div style="font-size:12px;color:#475569;margin-top:4px;font-style:italic">'+c.post.note+'</div>';
        html+='</div>';
      }
      html+='</div>';
    });
  }
  html+='</div>';
  return html;

// ── Form Tab ───────────────────────────────────────────────────────────────
function renderForm(){
  var history=calcFitnessMetrics();
  if(!history||history.length===0){
    return '<div class="empty-state" style="padding-top:40px"><div style="font-size:48px;margin-bottom:12px">&#128202;</div><div>Noch keine Trainingsdaten.</div><div style="font-size:12px;margin-top:8px">Trage Trainings ueber den Check-in ein.</div></div>';
  }
  var latest=history[history.length-1];
  var ctl=latest.ctl,atl=latest.atl,tsb=latest.tsb;
  var fl=ctl>0?Math.round(atl/ctl*100)/100:0;
  var flStr=fl.toFixed(2);
  var flColor,flIcon,flLabel,flDesc;
  if(fl<0.8){flColor='#38bdf8';flIcon='&#11015;&#65039;';flLabel='Detraining';flDesc='Du trainierst deutlich weniger als gewohnt. Fitness nimmt ab.'}
  else if(fl<1.0){flColor='#4ade80';flIcon='&#x1F6CF;&#xFE0F;';flLabel='Recovery';flDesc='Leichte Erholungsphase - wichtig fuer Fortschritt.'}
  else if(fl<1.3){flColor='#4ade80';flIcon='&#x2705;';flLabel='Produktiv';flDesc='Sweet Spot! Optimale Trainingsbelastung - Fitness steigt.'}
  else if(fl<1.5){flColor='#fb923c';flIcon='&#x26A0;&#xFE0F;';flLabel='Overreaching';flDesc='Etwas zu viel. Verletzungsrisiko steigt - Erholung einplanen.'}
  else{flColor='#f43f5e';flIcon='&#x1F6A8;';flLabel='Overtraining';flDesc='Ruhetag dringend empfohlen!'}
  var tsbColor=tsb>=5?'#4ade80':tsb>=-10?'#facc15':tsb>=-20?'#fb923c':'#f43f5e';
  var tsbLabel=tsb>=5?'Frisch &#10003;':tsb>=-10?'Neutral':tsb>=-20?'Muede':'Sehr muede';

  var html='<div style="padding-top:16px">';
  html+='<div class="section-title">Trainingszustand</div>';

  // Fatigue level card
  html+='<div style="background:'+flColor+'15;border:1px solid '+flColor+'40;border-radius:14px;padding:14px 16px;margin-bottom:12px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
  html+='<div style="font-size:13px;font-weight:700;color:'+flColor+'">'+flIcon+' '+flLabel+'</div>';
  html+='<div style="font-size:28px;font-weight:800;color:'+flColor+'">'+flStr+'</div></div>';
  html+='<div style="font-size:12px;color:#94a3b8;margin-bottom:10px">'+flDesc+'</div>';
  html+='<div style="display:flex;height:6px;border-radius:10px;overflow:hidden;gap:2px">';
  html+='<div style="flex:0.8;background:#38bdf8;opacity:0.5;border-radius:4px"></div>';
  html+='<div style="flex:0.2;background:#4ade80;opacity:0.7;border-radius:4px"></div>';
  html+='<div style="flex:0.3;background:#4ade80;border-radius:4px"></div>';
  html+='<div style="flex:0.2;background:#fb923c;border-radius:4px"></div>';
  html+='<div style="flex:0.5;background:#f43f5e;border-radius:4px"></div>';
  html+='</div>';
  html+='<div style="display:flex;justify-content:space-between;margin-top:4px">';
  ['0.8','1.0','1.3','1.5'].forEach(function(v){html+='<span style="font-size:9px;color:#475569">'+v+'</span>'});
  html+='</div>';
  html+='<div style="display:flex;justify-content:space-between;margin-top:2px">';
  ['Detrain','Recovery','Produktiv','Overreach','Overtr.'].forEach(function(v,i){
    var c=['#38bdf8','#4ade80','#4ade80','#fb923c','#f43f5e'][i];
    html+='<span style="font-size:9px;color:'+c+'">'+v+'</span>';
  });
  html+='</div></div>';

  // CTL/ATL/TSB boxes
  html+='<div style="display:flex;gap:8px;margin-bottom:16px">';
  html+='<div class="stat-box"><div style="font-size:22px;font-weight:700;color:#38bdf8">'+ctl+'</div><div style="font-size:10px;color:#475569;margin-top:2px">Fitness (CTL)</div></div>';
  html+='<div class="stat-box"><div style="font-size:22px;font-weight:700;color:#fb923c">'+atl+'</div><div style="font-size:10px;color:#475569;margin-top:2px">Ermuedung (ATL)</div></div>';
  html+='<div class="stat-box"><div style="font-size:22px;font-weight:700;color:'+tsbColor+'">'+(tsb>=0?'+':'')+tsb+'</div><div style="font-size:10px;color:#475569;margin-top:2px">Form (TSB)</div></div>';
  html+='</div>';
  html+='<div style="background:'+tsbColor+'18;border:1px solid '+tsbColor+'44;border-radius:12px;padding:12px 14px;margin-bottom:16px">';
  html+='<div style="font-size:14px;font-weight:700;color:'+tsbColor+';margin-bottom:2px">'+tsbLabel+'</div>';
  html+='<div style="font-size:12px;color:#94a3b8">'+(tsb>=5?'Optimal fuer Wettkampf':tsb>=-10?'Trainingsbereit':'Erholung empfohlen')+'</div></div>';

  // Chart
  var chartData=history.slice(-30);
  var maxVal=Math.max.apply(null,chartData.map(function(d){return Math.max(d.ctl,d.atl,Math.abs(d.tsb))}));
  if(maxVal<1)maxVal=1;
  var W=340,H=80;
  var ctlPts=chartData.map(function(d,i){var x=(i/(chartData.length-1||1))*W,y=H-(d.ctl/maxVal)*H;return(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)}).join(' ');
  var atlPts=chartData.map(function(d,i){var x=(i/(chartData.length-1||1))*W,y=H-(d.atl/maxVal)*H;return(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)}).join(' ');
  var tsbPts=chartData.map(function(d,i){var x=(i/(chartData.length-1||1))*W,y=(H/2)-(d.tsb/maxVal)*(H/2);return(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1)}).join(' ');

  html+='<div class="section-title">Verlauf (30 Tage)</div>';
  html+='<div class="card">';
  html+='<svg width="100%" viewBox="0 0 '+W+' '+(H+4)+'" style="overflow:visible">';
  html+='<line x1="0" y1="'+(H/2)+'" x2="'+W+'" y2="'+(H/2)+'" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4"/>';
  html+='<path d="'+ctlPts+'" fill="none" stroke="#38bdf8" stroke-width="2"/>';
  html+='<path d="'+atlPts+'" fill="none" stroke="#fb923c" stroke-width="2"/>';
  html+='<path d="'+tsbPts+'" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4"/>';
  html+='</svg>';
  html+='<div style="display:flex;gap:16px;margin-top:8px;justify-content:center">';
  html+='<span style="font-size:11px;color:#38bdf8">&#8212; Fitness</span>';
  html+='<span style="font-size:11px;color:#fb923c">&#8212; Ermuedung</span>';
  html+='<span style="font-size:11px;color:#4ade80">- - Form</span>';
  html+='</div></div>';

  // Last 7 days TSS
  html+='<div class="section-title">Letzte 7 Tage</div>';
  history.slice(-7).reverse().forEach(function(d){
    html+='<div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:4px">';
    html+='<span style="font-size:12px;color:#94a3b8">'+new Date(d.date+'T12:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})+'</span>';
    html+='<span style="font-size:12px;color:'+(d.tss>0?'#38bdf8':'#334155')+';font-weight:600">'+(d.tss>0?d.tss+' TSS':'&#8212;')+'</span>';
    html+='</div>';
  });

  html+='<div class="card" style="margin-top:12px">';
  html+='<div style="font-size:12px;font-weight:600;color:#38bdf8;margin-bottom:6px">Was bedeutet das?</div>';
  html+='<div style="font-size:12px;color:#94a3b8;line-height:1.7"><b style="color:#38bdf8">CTL</b> = Fitness (42-Tage-Schnitt) &middot; <b style="color:#fb923c">ATL</b> = Ermuedung (7-Tage) &middot; <b style="color:#4ade80">TSB</b> = Form (CTL-ATL)<br>Fatigue Level = ATL/CTL: 1.0-1.3 = Sweet Spot &#x2705;</div>';
  html+='</div></div>';
  return html;
}
